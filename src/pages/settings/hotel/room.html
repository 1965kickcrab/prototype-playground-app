<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다이얼독 비즈 - 호실 설정</title>
  <link rel="stylesheet" href="../../../../styles/base.css">
  <link rel="stylesheet" href="../../../../styles/layout.css">
  <link rel="stylesheet" href="../../../../styles/components.css">
</head>
<body data-settings-scope="hotel">
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar__header">
        <a class="icon-button icon-button--secondary" aria-label="뒤로 가기" href="../../../../public/index.html">
          <img src="../../../../assets/iconBack.svg" alt="" aria-hidden="true">
        </a>
        <span class="sidebar__title">환경 설정</span>
      </div>
      <nav class="sidebar__nav" aria-label="주요 메뉴">
        <div class="sidebar__group" data-sidebar-group>
          <button class="sidebar__nav-item sidebar__group-toggle" type="button" aria-expanded="false">
            <img class="sidebar__group-icon" src="../../../../assets/menuIcon_daycare.svg" alt="" aria-hidden="true">
            <span class="sidebar__group-title">유치원</span>
            <img class="sidebar__group-caret" src="../../../../assets/menuFold_fold.svg" alt="" aria-hidden="true" data-sidebar-caret data-open-src="../../../../assets/menuFold.svg" data-closed-src="../../../../assets/menuFold_fold.svg">
          </button>
          <div class="sidebar__group-list">
            <a class="sidebar__nav-item sidebar__nav-item--sub" href="../school/operations.html">
              <span>영업 &amp; 휴무</span>
            </a>
            <a class="sidebar__nav-item sidebar__nav-item--sub" href="../school/reservation-policy.html">
              <span>예약 정책</span>
            </a>
            <a class="sidebar__nav-item sidebar__nav-item--sub" href="../school/class.html">
              <span>클래스 설정</span>
            </a>
          </div>
        </div>
        <div class="sidebar__group" data-sidebar-group>
          <button class="sidebar__nav-item sidebar__nav-item--active sidebar__group-toggle" type="button" aria-expanded="true">
            <img class="sidebar__group-icon" src="../../../../assets/menuIcon_hotel.svg" alt="" aria-hidden="true">
            <span class="sidebar__group-title">호텔링</span>
            <img class="sidebar__group-caret" src="../../../../assets/menuFold.svg" alt="" aria-hidden="true" data-sidebar-caret data-open-src="../../../../assets/menuFold.svg" data-closed-src="../../../../assets/menuFold_fold.svg">
          </button>
          <div class="sidebar__group-list">
            <a class="sidebar__nav-item sidebar__nav-item--sub" href="operations.html">
              <span>영업 &amp; 휴무</span>
            </a>
            <a class="sidebar__nav-item sidebar__nav-item--sub" href="reservation-policy.html">
              <span>예약 정책</span>
            </a>
            <a class="sidebar__nav-item sidebar__nav-item--sub sidebar__nav-item--active" href="room.html">
              <span>호실 설정</span>
            </a>
          </div>
        </div>
      </nav>
    </aside>

    <main class="main">
      <div class="main__content">
        <section class="page-header class-registration__header">
          <div class="class-registration__title">
            <h1>호실 목록</h1>
            <p>운영 중인 호실을 관리하세요.</p>
          </div>
          <div class="page-actions">
            <button class="primary-button" type="button" data-class-modal-open>호실 등록</button>
          </div>
        </section>
        <section class="list-card class-registration__card">
          <div class="list-table list-table--class list-table--room" role="table" aria-label="호실 목록">
            <div class="list-table__header" role="row">
              <span role="columnheader">호실 이름</span>
              <span role="columnheader">정원</span>
              <span role="columnheader">예약 가능한 이용권</span>
            </div>
            <div class="list-table__body" data-class-rows></div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <div class="modal" data-class-modal aria-hidden="true">
    <div class="modal__overlay" data-class-modal-overlay></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="class-modal-title">
      <div class="modal__header">
        <h2 id="class-modal-title">호실 등록</h2>
        <button class="icon-button modal__close" type="button" data-class-modal-close aria-label="닫기">
          <img src="../../../../assets/iconClose.svg" alt="" aria-hidden="true">
        </button>
      </div>
      <div class="modal__body">
          <div class="settings-modal-form">
            <label class="form-field">
              <span class="form-field__label">호실 이름</span>
              <input class="form-field__control" type="text" placeholder="예: 스탠다드호실" data-class-name>
            </label>
              <label class="form-field">
                <span class="form-field__label form-field__label--inline">
                    <span>호실 수</span>
                  <span class="tooltip-icon" role="img" aria-label="회원 앱에서 예약 가능한 최대 인원" data-tooltip="회원 앱에서 예약 가능한 최대 인원">i</span>
                </span>
                <input class="form-field__control" type="number" min="1" placeholder="0" data-class-capacity>
              </label>
              <label class="form-field form-field--full">
                <span class="form-field__label">체중 제한</span>
                <div class="pricing-weight-range">
                  <div class="pricing-weight-field">
                    <div class="ticket-input-group">
                      <input class="form-field__control" type="number" min="0" placeholder="0" data-class-weight-min>
                      <span class="ticket-input-suffix">이상</span>
                    </div>
                  </div>
                  <span class="pricing-weight-tilde">~</span>
                  <div class="pricing-weight-field">
                    <div class="ticket-input-group">
                      <input class="form-field__control" type="number" min="0" placeholder="0" data-class-weight-max>
                      <span class="ticket-input-suffix">미만</span>
                    </div>
                  </div>
                </div>
              </label>
              <label class="form-field form-field--full" data-class-tickets-section>
                <div class="class-ticket-stack settings-selection-stack">
                  <div class="form-field__label form-field__label--row">
                    <span>예약 가능한 이용권</span>
                    <span class="class-ticket-actions settings-selection-actions">
                      <span class="class-ticket-count settings-selection-count" data-class-ticket-count>0개</span>
                      <button class="button-secondary button-secondary--small select-all-button" type="button" data-class-ticket-select-all>전체 선택</button>
                    </span>
                  </div>
                  <div class="class-ticket-list settings-selection-list settings-selection-list--tickets" data-class-tickets></div>
                </div>
            </label>
          <label class="form-field form-field--full">
            <span class="form-field__label">호실 설명</span>
            <textarea class="form-field__control" rows="3" placeholder="호실 특징을 입력해주세요." data-class-description></textarea>
          </label>

          <div class="reservation-submit form-field--full">
            <button class="primary-button" type="button" data-class-submit>등록</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="modal" data-class-detail-modal aria-hidden="true">
    <div class="modal__overlay" data-class-detail-overlay></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="class-detail-title">
      <div class="modal__header">
        <h2 id="class-detail-title">호실 상세</h2>
        <button class="icon-button modal__close" type="button" data-class-detail-close aria-label="닫기">
          <img src="../../../../assets/iconClose.svg" alt="" aria-hidden="true">
        </button>
      </div>
      <div class="modal__body">
        <div class="settings-modal-form">
          <label class="form-field">
            <span class="form-field__label">호실 이름</span>
            <input class="form-field__control" type="text" placeholder="예: 스탠다드호실" data-class-name>
          </label>
            <label class="form-field">
              <span class="form-field__label form-field__label--inline">
                  <span>호실 수</span>
                <span class="tooltip-icon" role="img" aria-label="회원 앱에서 예약 가능한 최대 인원" data-tooltip="회원 앱에서 예약 가능한 최대 인원">i</span>
              </span>
              <input class="form-field__control" type="number" min="1" placeholder="0" data-class-capacity>
            </label>
            <label class="form-field form-field--full">
              <span class="form-field__label">체중 제한</span>
              <div class="pricing-weight-range">
                <div class="pricing-weight-field">
                  <div class="ticket-input-group">
                    <input class="form-field__control" type="number" min="0" placeholder="0" data-class-weight-min>
                    <span class="ticket-input-suffix">이상</span>
                  </div>
                </div>
                <span class="pricing-weight-tilde">~</span>
                <div class="pricing-weight-field">
                  <div class="ticket-input-group">
                    <input class="form-field__control" type="number" min="0" placeholder="0" data-class-weight-max>
                    <span class="ticket-input-suffix">미만</span>
                  </div>
                </div>
              </div>
            </label>
            <label class="form-field form-field--full" data-class-tickets-section>
              <div class="class-ticket-stack settings-selection-stack">
                <div class="form-field__label form-field__label--row">
                  <span>예약 가능한 이용권</span>
                  <span class="class-ticket-actions settings-selection-actions">
                    <span class="class-ticket-count settings-selection-count" data-class-ticket-count>0개</span>
                    <button class="button-secondary button-secondary--small select-all-button" type="button" data-class-ticket-select-all>전체 선택</button>
                  </span>
                </div>
                <div class="class-ticket-list settings-selection-list settings-selection-list--tickets" data-class-tickets></div>
              </div>
          </label>
          <label class="form-field form-field--full">
            <span class="form-field__label">호실 설명</span>
            <textarea class="form-field__control" rows="3" placeholder="호실 특징을 입력해주세요." data-class-description></textarea>
          </label>

          <div class="reservation-submit form-field--full">
            <button class="button-secondary button-secondary--danger" type="button" data-class-delete>삭제</button>
            <button class="primary-button" type="button" data-class-update>수정</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="../class-settings.js"></script>
</body>
</html>
