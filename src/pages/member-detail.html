<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다이얼독 비즈 - 회원 상세</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../../styles/layout.css">
  <link rel="stylesheet" href="../../styles/components.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" hidden>
      <div class="sidebar__brand">
        <img class="sidebar__brand-icon" src="../../assets/logoImg.svg" alt="다이얼독 비즈">
        <img class="sidebar__brand-text" src="../../assets/logoText.svg" alt="다이얼독 비즈 텍스트">
      </div>
    </aside>

    <main class="main">
      <div class="reservation-detail-page member-detail-page">
        <header class="reservation-detail-page__nav">
          <button class="icon-button icon-button--secondary reservation-detail-page__back" type="button" data-member-detail-back aria-label="뒤로가기">
            <img src="../../assets/iconBack.svg" alt="" aria-hidden="true">
          </button>
          <h1>회원 상세</h1>
          <button class="reservation-detail-page__nav-action" type="button" data-member-detail-edit-open data-member-detail-edit="pet">수정</button>
        </header>

        <div class="reservation-detail-page__body member-detail-page__body">
          <section class="reservation-detail-page__section member-detail-page__profile-section">
            <div class="reservation-detail-page__member">
              <div class="reservation-detail-page__avatar" aria-hidden="true">
                <img src="../../assets/defaultProfile_dog.svg" alt="">
              </div>
              <div class="reservation-detail-page__member-copy">
                <div class="reservation-detail-page__member-head">
                  <strong data-member-dog-name>-</strong>
                  <p data-member-breed>-</p>
                </div>
                <p class="reservation-detail-page__guardian member-detail-page__guardian">
                  <span data-member-owner>-</span>
                  <span> 보호자 (</span>
                  <span data-member-phone>-</span>
                  <span>)</span>
                </p>
                <div class="member-detail__summary-tags" data-member-pet-tags hidden></div>
                <div class="member-detail__owner-tags" data-member-owner-tags hidden></div>
              </div>
            </div>

            <div class="reservation-detail-page__memo-panel member-detail-page__panel">
              <button
                class="reservation-detail-page__memo-trigger"
                type="button"
                data-member-detail-info-toggle
                aria-expanded="false"
              >
                <span class="reservation-detail-page__memo-label">상세 정보</span>
              </button>
              <div class="reservation-detail-page__memo-content member-detail-page__detail-content" data-member-detail-info-content hidden>
                <ul class="member-detail-page__detail-list">
                  <li>
                    <span class="member-detail-page__detail-copy">주소 : <strong data-member-address>-</strong></span>
                  </li>
                  <li>
                    <span class="member-detail-page__detail-copy">생년월일 : <strong data-member-birth-date>-</strong></span>
                  </li>
                  <li>
                    <span class="member-detail-page__detail-copy">몸무게 : <strong data-member-weight>-</strong></span>
                  </li>
                  <li>
                    <span class="member-detail-page__detail-copy">성별 : <strong data-member-gender>-</strong></span>
                  </li>
                  <li>
                    <span class="member-detail-page__detail-copy">동물등록번호 : <strong data-member-registration>-</strong></span>
                  </li>
                  <li>
                    <span class="member-detail-page__detail-copy">털색 : <strong data-member-coat-color>-</strong></span>
                  </li>
                </ul>
              </div>
            </div>

            <div class="reservation-detail-page__memo-panel member-detail-page__panel">
              <button
                class="reservation-detail-page__memo-trigger"
                type="button"
                data-member-detail-memo-toggle
                aria-expanded="false"
              >
                <span class="reservation-detail-page__memo-label">메모</span>
              </button>
              <div class="reservation-detail-page__memo-content member-detail-page__memo-content" data-member-detail-memo-content hidden>
                <p class="member-detail-page__memo-text" data-member-memo hidden></p>
                <p class="member-detail-page__memo-empty" data-member-memo-empty>작성한 메모가 없습니다.</p>
                <button class="member-detail-page__memo-action" type="button" data-member-detail-memo-edit>메모 수정</button>
              </div>
            </div>
          </section>

          <section class="reservation-detail-page__section member-detail-page__tickets-section">
            <div class="reservation-detail-page__section-head member-detail-page__tickets-head">
              <h2 class="reservation-detail-page__section-title">이용권</h2>
              <span class="reservation-detail-page__section-summary" data-member-reservable-summary>(예약 가능 0회)</span>
            </div>

            <button class="primary-button member-detail-page__issue-button" type="button" data-member-detail-issue>이용권 지급</button>

            <div class="member-detail__ticket-list" data-member-ticket-table>
              <div class="member-detail__ticket-cards" data-member-ticket-rows></div>
            </div>
            <p class="member-detail__empty member-detail__tickets-empty" data-member-ticket-empty hidden>지급된 이용권이 없습니다.</p>
          </section>
        </div>
      </div>
    </main>
  </div>

  <div class="modal" data-member-ticket-issue-modal aria-hidden="true">
    <div class="modal__overlay" data-member-ticket-issue-overlay></div>
    <div class="modal__dialog member-ticket-issue-modal" role="dialog" aria-modal="true" aria-labelledby="member-ticket-issue-title">
      <div class="modal__header">
        <h2 id="member-ticket-issue-title">이용권 지급</h2>
        <button class="icon-button modal__close" type="button" data-member-ticket-issue-close aria-label="닫기">
          <img src="../../assets/iconClose.svg" alt="" aria-hidden="true">
        </button>
      </div>
      <div class="modal__body member-ticket-issue">
        <div class="member-ticket-issue__summary">
          <div class="member-ticket-issue__summary-row">
            <span>회원</span>
            <strong data-member-ticket-issue-member>-</strong>
          </div>
          <div class="member-detail__status" data-member-ticket-issue-status></div>
        </div>
        <div class="member-ticket-issue__title">이용권 목록</div>
        <div class="member-ticket-issue__table" role="table" aria-label="이용권 목록">
          <div class="member-ticket-issue__header" role="row">
            <span role="columnheader">
              <input type="checkbox" data-member-ticket-issue-select-all aria-label="전체 선택">
            </span>
            <span role="columnheader">이용권</span>
            <span role="columnheader">총수량</span>
            <span role="columnheader">유효기간</span>
            <span role="columnheader">가격</span>
            <span role="columnheader">수량</span>
          </div>
          <div class="member-ticket-issue__body" data-member-ticket-issue-rows></div>
        </div>
        <div class="member-ticket-issue__actions">
          <button class="primary-button member-ticket-issue__submit" type="button" data-member-ticket-issue-submit disabled>지급</button>
        </div>
      </div>
    </div>
  </div>
  <div class="modal" data-member-detail-edit-modal aria-hidden="true">
    <div class="modal__overlay" data-member-detail-edit-overlay></div>
    <div class="modal__dialog member-edit-modal" role="dialog" aria-modal="true" aria-labelledby="member-detail-edit-title">
      <div class="modal__header">
        <h2 id="member-detail-edit-title" data-member-detail-edit-title>반려견 수정</h2>
        <button class="icon-button modal__close" type="button" data-member-detail-edit-close aria-label="닫기">
          <img src="../../assets/iconClose.svg" alt="" aria-hidden="true">
        </button>
      </div>
      <div class="modal__body member-edit-modal__body">
        <div class="member-edit-modal__member" data-member-detail-edit-member>-</div>
        <div class="member-edit-modal__fields" data-member-detail-edit-fields></div>
      </div>
      <div class="member-edit-modal__actions">
        <button class="button-secondary" type="button" data-member-detail-edit-cancel>취소</button>
        <button class="primary-button" type="button" data-member-detail-edit-save>저장</button>
      </div>
    </div>
  </div>
  <div class="modal" data-member-ticket-detail-modal aria-hidden="true">
    <div class="modal__overlay" data-member-ticket-detail-overlay></div>
    <div class="modal__dialog member-ticket-detail-modal" role="dialog" aria-modal="true" aria-labelledby="member-ticket-detail-title">
      <div class="modal__header">
        <h2 id="member-ticket-detail-title">이용권 상세</h2>
        <button class="icon-button modal__close" type="button" data-member-ticket-detail-close aria-label="닫기">
          <img src="../../assets/iconClose.svg" alt="" aria-hidden="true">
        </button>
      </div>
      <div class="modal__body member-ticket-detail">
        <section class="member-ticket-detail__section">
          <h3 class="member-ticket-detail__section-title">정보</h3>
          <div class="member-ticket-detail__card">
            <div class="member-ticket-detail__card-head">
              <div class="member-ticket-detail__title-wrap">
                <strong data-member-ticket-detail-name>-</strong>
                <span data-member-ticket-detail-meta>-</span>
              </div>
              <span class="member-ticket-detail__status" data-member-ticket-detail-status>-</span>
            </div>
            <div class="member-ticket-detail__info-list">
              <div>
                <span>지급일</span>
                <strong data-member-ticket-detail-issued>-</strong>
              </div>
              <div>
                <span>개시일</span>
                <strong data-member-ticket-detail-start>-</strong>
              </div>
              <div>
                <span>만료일</span>
                <strong data-member-ticket-detail-expiry>-</strong>
              </div>
            </div>
          </div>
        </section>
        <section class="member-ticket-detail__section">
          <div class="member-ticket-detail__section-head">
            <h3 class="member-ticket-detail__section-title">사용 내역</h3>
            <div class="member-ticket-detail__summary" data-member-ticket-detail-summary></div>
          </div>
          <div class="member-ticket-detail__history-table">
            <div class="member-ticket-detail__history-head">
              <span>상태</span>
              <span>서비스</span>
              <span>방문일</span>
              <span>예약 일시 (취소 일시)</span>
            </div>
            <div class="member-ticket-detail__history-body" data-member-ticket-detail-history></div>
          </div>
          <p class="member-ticket-detail__empty" data-member-ticket-detail-empty hidden>사용 내역이 없습니다.</p>
        </section>
      </div>
    </div>
  </div>
  <script type="module" src="./member-detail-page.js"></script>
</body>
</html>
