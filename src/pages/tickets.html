<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다이얼독 비즈 - 이용권</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../../styles/layout.css">
  <link rel="stylesheet" href="../../styles/components.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" hidden></aside>

    <main class="main">
      <header class="ticket-list-page__nav">
        <a class="ticket-list-page__back" href="./more.html" aria-label="뒤로가기">
          <img src="../../assets/iconBack.svg" alt="" aria-hidden="true">
        </a>
        <h1>이용권</h1>
        <a class="ticket-list-page__create" href="./ticket-create.html">등록</a>
      </header>

      <div class="main__content ticket-list-page">
        <section class="ticket-service-tabs ticket-list-page__tabs swipe-tab-scroller" data-ticket-service-tabs aria-label="서비스 유형">
          <button class="ticket-service-tabs__item is-active" type="button" data-ticket-service-filter="all">전체</button>
          <button class="ticket-service-tabs__item" type="button" data-ticket-service-filter="school">유치원</button>
          <button class="ticket-service-tabs__item" type="button" data-ticket-service-filter="daycare">데이케어</button>
          <button class="ticket-service-tabs__item" type="button" data-ticket-service-filter="hoteling">호텔링</button>
          <button class="ticket-service-tabs__item" type="button" data-ticket-service-filter="pickdrop">픽드랍</button>
        </section>
        <section class="ticket-list-page__list" data-ticket-rows role="list" aria-label="이용권 목록"></section>
        <p class="ticket-list-page__empty" data-ticket-empty hidden>등록된 이용권이 없습니다.</p>
      </div>
    </main>
  </div>
  <script type="module" src="./ticket-page.js"></script>
</body>
</html>
