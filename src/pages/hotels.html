<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다이얼독 비즈 - 호텔링</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../../styles/layout.css">
  <link rel="stylesheet" href="../../styles/components.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" hidden>
      <div class="sidebar__brand">
        <img class="sidebar__brand-icon" src="../../assets/logoImg.svg" alt="다이얼독 비즈">
        <img class="sidebar__brand-text" src="../../assets/logoText.svg" alt="다이얼독 비즈 텍스트">
      </div>
    </aside>

    <main class="main">
      <header class="topbar topbar--daycare-home">
        <div class="topbar__left topbar__left--brand reservation-entry">
          <button class="topbar__brand" type="button" data-service-switch-open aria-expanded="false" aria-label="서비스 전환">
            <span class="topbar__brand-icon topbar__brand-icon--accent" aria-hidden="true">
              <img src="../../assets/menuIcon_hotel_on.svg" alt="">
            </span>
            <span class="topbar__brand-copy">
              <span class="topbar__brand-text">호텔링</span>
              <span class="topbar__brand-meta">정원 <span data-hoteling-capacity>12</span></span>
            </span>
            <img class="topbar__brand-caret" src="../../assets/iconDropdown.svg" alt="" aria-hidden="true">
          </button>
          <div class="service-menu" data-service-switch-menu role="menu" hidden>
            <button class="menu-option" type="button" data-service-switch-href="../../public/index.html" role="menuitem">
              <span class="menu-option__title">유치원</span>
            </button>
            <button class="menu-option" type="button" data-service-switch-href="./hotels.html" role="menuitem">
              <span class="menu-option__title">호텔링</span>
            </button>
          </div>
        </div>
        <div class="topbar__actions">
          <a class="icon-button icon-button--secondary topbar__action-button" href="./hotel-reservation-create.html" aria-label="예약 등록">
            <img src="../../assets/iconCreateSchedule.svg" alt="" aria-hidden="true">
          </a>
          <button class="icon-button icon-button--secondary topbar__action-button" type="button" aria-label="검색">
            <img src="../../assets/iconSearch.svg" alt="" aria-hidden="true">
          </button>
        </div>
      </header>

      <div class="main__content">
        <section class="filter-panel-wrap" hidden>
          <section class="page-header hoteling-header">
            <div class="hoteling-header__title">
              <div class="page-filters" aria-label="필터">
                <button class="filter-toggle" type="button" data-filter-toggle aria-expanded="false">
                  <span>필터</span>
                  <span class="filter-toggle__badge" data-filter-badge hidden>0</span>
                  <span class="filter-toggle__caret" aria-hidden="true"></span>
                </button>
              </div>
            </div>
            <div class="page-actions"></div>
          </section>
          <section class="filter-panel" data-filter-panel-body hidden>
            <div class="filter-panel__row">
              <div class="filter-dropdown">
                <button class="filter-select" type="button" data-filter-button="room" aria-expanded="false">전체 호실</button>
                <div class="filter-menu" data-filter-menu="room" hidden></div>
              </div>
              <div class="filter-dropdown">
                <button class="filter-select" type="button" data-filter-button="payment" aria-expanded="false">결제 여부</button>
                <div class="filter-menu" data-filter-menu="payment" hidden></div>
              </div>
              <div class="filter-dropdown">
                <button class="filter-select" type="button" data-filter-button="tag" aria-expanded="false">태그</button>
                <div class="filter-menu" data-filter-menu="tag" hidden></div>
              </div>
              <button class="filter-reset" type="button" data-filter-reset>
                <img src="../../assets/iconInitial.svg" alt="" aria-hidden="true">
                초기화
              </button>
            </div>
          </section>
        </section>

        <section class="reservation-card reservation-card--home-mobile">
          <div class="hoteling-toolbar">
            <div class="reservation-card__controls">
              <button class="month-button month-button--prev" aria-label="이전 월">
                <img class="month-button__icon" src="../../assets/iconChevronLeft.svg" alt="" aria-hidden="true">
              </button>
              <div class="reservation-card__current">
                <span data-hoteling-current-month>2025. 07</span>
              </div>
              <button class="month-button month-button--next" aria-label="다음 월">
                <img class="month-button__icon" src="../../assets/iconChevronRight.svg" alt="" aria-hidden="true">
              </button>
              <button class="button-neutral button-neutral--small" type="button" data-hoteling-today hidden>오늘</button>
            </div>
          </div>

          <div class="hoteling-layout">
            <div class="calendar hoteling-calendar">
              <div class="calendar__grid" data-hoteling-calendar-grid></div>
            </div>

            <section class="list-card list-card--home-mobile hoteling-list-card">
              <div class="list-card__header">
                <div class="list-card__meta">
                  <div class="list-card-date" data-hoteling-list-date>7월 3일</div>
                  <div class="list-card__title-row">
                    <div class="list-card__title">숙박 <span class="text-primary" data-hoteling-total-count>0</span></div>
                  </div>
                </div>
                <div class="hoteling-list-summary">
                  <div class="hoteling-list-summary__card hoteling-list-summary__card--checkin">
                    <span class="hoteling-list-summary__label">입실</span>
                    <strong data-hoteling-checkin-count>0</strong>
                  </div>
                  <div class="hoteling-list-summary__card hoteling-list-summary__card--checkout">
                    <span class="hoteling-list-summary__label">퇴실</span>
                    <strong data-hoteling-checkout-count>0</strong>
                  </div>
                  <div class="hoteling-list-summary__card hoteling-list-summary__card--stay">
                    <span class="hoteling-list-summary__label">숙박</span>
                    <strong data-hoteling-stay-count>0</strong>
                  </div>
                </div>
              </div>

              <div class="hoteling-list-empty" data-hoteling-list-empty>예약이 없습니다.</div>
              <div class="hoteling-feed" data-hoteling-feed role="list" aria-label="호텔링 예약 목록"></div>
            </section>
          </div>
        </section>
      </div>
    </main>

    <nav class="mobile-tabbar" aria-label="하단 메뉴">
      <a class="mobile-tabbar__link mobile-tabbar__link--active" href="./hotels.html" aria-current="page">
        <img src="../../assets/bottomNavi_schedule_on.svg" alt="" aria-hidden="true">
        <span>일정</span>
      </a>
      <a class="mobile-tabbar__link" href="#">
        <img src="../../assets/bottomNavi_report.svg" alt="" aria-hidden="true">
        <span>알림장</span>
      </a>
      <a class="mobile-tabbar__link" href="./members.html">
        <img src="../../assets/bottomNavi_member.svg" alt="" aria-hidden="true">
        <span>회원</span>
      </a>
      <a class="mobile-tabbar__link" href="./more.html">
        <img src="../../assets/bottomNavi_more.svg" alt="" aria-hidden="true">
        <span>더보기</span>
      </a>
    </nav>
  </div>

  <script type="module" src="./hotels.js"></script>
</body>
</html>
