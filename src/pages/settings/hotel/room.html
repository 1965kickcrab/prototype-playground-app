            <h1>호실 목록</h1>

            <button class="primary-button" type="button" data-class-modal-open>호실 등록</button>

        <button class="icon-button modal__close" type="button" data-class-modal-close aria-label="닫기">

        </button>
      </div>
      <div class="room-form__name-field">
        <label class="form-field form-field--full">
          <span class="form-field__label">호실 이름</span>
          <input class="form-field__control" type="text" placeholder="예: 스탠다드호실" data-class-name>
        </label>
      </div>
      <div class="modal-tabs" role="tablist" aria-label="호실 등록 탭">
        <button class="modal-tab is-active" type="button" role="tab" aria-selected="true" data-class-tab="basic">기본 정보</button>
        <button class="modal-tab" type="button" role="tab" aria-selected="false" data-class-tab="reservation">예약 설정</button>
        <button class="modal-tab" type="button" role="tab" aria-selected="false" data-class-tab="pricing">요금 정보</button>
      </div>
      <div class="modal__body">
        <div class="modal-tab-panel is-active" role="tabpanel" data-class-tab-panel="basic">
          <div class="settings-modal-form">
            <label class="form-field form-field--full">
              <span class="form-field__label">호실 설명</span>
              <textarea class="form-field__control" rows="3" placeholder="호실 특징을 입력해주세요." data-class-description></textarea>
            </label>
          </div>
        </div>
        <div class="modal-tab-panel" role="tabpanel" data-class-tab-panel="reservation" hidden>
          <div class="settings-modal-form">
            <label class="form-field">
                <span class="form-field__label form-field__label--inline">
                  <span>호실 수</span>
                  <span class="tooltip-icon" role="img" aria-label="회원 앱에서 예약 가능한 최대 인원" data-tooltip="회원 앱에서 예약 가능한 최대 인원">i</span>
                </span>
                <input class="form-field__control" type="number" min="1" placeholder="0" data-class-capacity>
            </label>
            <label class="form-field form-field--full" data-class-tickets-section>
              <div class="class-ticket-stack settings-selection-stack">
                <div class="form-field__label form-field__label--row">
                  <span>예약 가능한 이용권</span>
                  <span class="class-ticket-actions settings-selection-actions">
                    <span class="class-ticket-count settings-selection-count" data-class-ticket-count>0개</span>
                    <button class="button-secondary button-secondary--small select-all-button" type="button" data-class-ticket-select-all>전체 선택</button>
                  </span>
                </div>
                <div class="class-ticket-list settings-selection-list settings-selection-list--tickets" data-class-tickets></div>
              </div>
            </label>
          </div>
        </div>

              </div>

                  <span>99kg</span>
                </div>

              </div>

                  <span role="columnheader">미만</span>

            <div class="form-field form-field--full">

                  <label class="toggle-row toggle-row--compact">
                    <input type="checkbox" aria-label="추가 요금 사용" data-room-pricing-extra-enabled>
                    <span class="toggle-switch" aria-hidden="true"></span>

                      aria-selected="true"
                      data-room-pricing-extra-mode="grouped"

                      <span class="ticket-input-suffix">원</span>

                  <label class="room-pricing-extra__item">
                    <span class="room-pricing-extra__name">주말 (금, 토)</span>
                    <span class="ticket-input-group">
                      <input class="form-field__control" type="text" inputmode="numeric" placeholder="0" data-room-pricing-extra-fee="weekend">

                    <span class="ticket-input-group">
                      <input class="form-field__control" type="text" inputmode="numeric" placeholder="0" data-room-pricing-extra-fee="tue">
                      <span class="ticket-input-suffix">원</span>

                    <span class="room-pricing-extra__name">수</span>
                    <span class="ticket-input-group">
                      <input class="form-field__control" type="text" inputmode="numeric" placeholder="0" data-room-pricing-extra-fee="wed">
                      <span class="ticket-input-suffix">원</span>

                  <label class="room-pricing-extra__item">
                    <span class="room-pricing-extra__name">목</span>
                    <span class="ticket-input-group">

                  <label class="room-pricing-extra__item">

                    <span class="room-pricing-extra__name">공휴일</span>
                    <span class="ticket-input-group">
                      <input class="form-field__control" type="text" inputmode="numeric" placeholder="0" data-room-pricing-extra-fee="holidayDaily">
                      <span class="ticket-input-suffix">원</span>
                    </span>

                </div>
              </div>
            </div>
            <div class="form-field form-field--full">
              <span class="form-field__label">VAT 별도</span>
              <label class="toggle-row pricing-vat-toggle room-pricing-vat-toggle">
                <input type="checkbox" aria-label="VAT 별도" data-room-pricing-vat>
                <span class="toggle-switch" aria-hidden="true"></span>
              </label>
            </div>
          </div>
        </div>
        <div class="settings-modal-form">
          <div class="reservation-submit form-field--full">
            <button class="primary-button" type="button" data-class-submit>등록</button>

        </div>
      </div>
    </div>

                      <span class="ticket-input-suffix">원</span>
                    </span>
                  </label>
                  <label class="room-pricing-extra__item">
                    <span class="room-pricing-extra__name">일</span>
                    <span class="ticket-input-group">
                      <input class="form-field__control" type="text" inputmode="numeric" placeholder="0" data-room-pricing-extra-fee="sun">
                      <span class="ticket-input-suffix">원</span>
                    </span>
                  </label>
                  <label class="room-pricing-extra__item">
                    <span class="room-pricing-extra__name">공휴일</span>
                    <span class="ticket-input-group">
                      <input class="form-field__control" type="text" inputmode="numeric" placeholder="0" data-room-pricing-extra-fee="holidayDaily">
                      <span class="ticket-input-suffix">원</span>
                    </span>
                  </label>
                </div>
              </div>
            </div>
            <div class="form-field form-field--full">
              <span class="form-field__label">VAT 별도</span>
              <label class="toggle-row pricing-vat-toggle room-pricing-vat-toggle">
                <input type="checkbox" aria-label="VAT 별도" data-room-pricing-vat>
                <span class="toggle-switch" aria-hidden="true"></span>
              </label>
            </div>
          </div>
        </div>
        <div class="settings-modal-form">
          <div class="reservation-submit form-field--full">
            <button class="button-secondary button-secondary--danger" type="button" data-class-delete>삭제</button>
            <button class="primary-button" type="button" data-class-update>수정</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="../class-settings.js"></script>
</body>
</html>
