<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다이얼독 비즈 - 회원</title>
  <link rel="stylesheet" href="../../styles/base.css">
  <link rel="stylesheet" href="../../styles/layout.css">
  <link rel="stylesheet" href="../../styles/components.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" hidden>
      <div class="sidebar__brand">
        <img class="sidebar__brand-icon" src="../../assets/logoImg.svg" alt="다이얼독 비즈">
        <img class="sidebar__brand-text" src="../../assets/logoText.svg" alt="다이얼독 비즈 텍스트">
      </div>
    </aside>

    <main class="main">
      <header class="topbar members-topbar">
        <div class="members-topbar__title">
          <h1>회원</h1>
        </div>
        <div class="topbar__actions">
          <button class="icon-button icon-button--secondary members-topbar__action" type="button" aria-label="회원 추가">
            <img src="../../assets/iconAddMember.svg" alt="" aria-hidden="true">
          </button>
        </div>
      </header>

      <div class="main__content members-page">
        <section class="members-page__search-section">
          <div class="members-page__search-row">
            <label class="members-search-field">
              <img src="../../assets/iconSearch.svg" alt="" aria-hidden="true">
              <input type="search" placeholder="반려견 이름" data-member-search>
            </label>
            <label class="member-label-field">
              <input type="text" placeholder="태그" readonly data-member-label-input aria-label="태그" aria-haspopup="dialog" aria-expanded="false">
            </label>
          </div>
          <div class="members-page__summary" hidden>
            <div class="member-card__count" data-member-count>
              <span data-member-count-value>0</span>
              <span class="member-card__count-unit">마리</span>
            </div>
          </div>
        </section>

        <section class="members-list-section">
          <div class="member-list" data-member-rows role="list" aria-label="회원 목록"></div>
          <div class="ticket-pagination" data-member-pagination aria-label="페이지네이션"></div>
        </section>
      </div>
    </main>

    <nav class="mobile-tabbar" aria-label="하단 메뉴">
      <a class="mobile-tabbar__link" href="../../public/index.html">
        <img src="../../assets/bottomNavi_schedule.svg" alt="" aria-hidden="true">
        <span>일정</span>
      </a>
      <a class="mobile-tabbar__link" href="./attendance.html">
        <img src="../../assets/bottomNavi_rollbook.svg" alt="" aria-hidden="true">
        <span>출석부</span>
      </a>
      <a class="mobile-tabbar__link" href="#">
        <img src="../../assets/bottomNavi_report.svg" alt="" aria-hidden="true">
        <span>알림장</span>
      </a>
      <a class="mobile-tabbar__link mobile-tabbar__link--active" href="./members.html" aria-current="page">
        <img src="../../assets/bottomNavi_member_on.svg" alt="" aria-hidden="true">
        <span>회원</span>
      </a>
      <a class="mobile-tabbar__link" href="./more.html">
        <img src="../../assets/bottomNavi_more.svg" alt="" aria-hidden="true">
        <span>더보기</span>
      </a>
    </nav>
  </div>
  <div class="member-search-page__sheet-backdrop" data-member-label-sheet-backdrop hidden></div>
  <div class="member-search__tag-menu member-label-sheet" data-member-label-sheet hidden>
    <div class="member-search__sheet-header">
      <strong class="member-search__sheet-title">태그 선택</strong>
      <button class="icon-button icon-button--secondary member-search__sheet-close" type="button" data-member-label-sheet-close aria-label="닫기">
        <img src="../../assets/iconClose.svg" alt="" aria-hidden="true">
      </button>
    </div>
    <label class="members-search-field member-label-sheet__search">
      <img src="../../assets/iconSearch.svg" alt="" aria-hidden="true">
      <input type="search" placeholder="태그 검색" data-member-label-sheet-search>
    </label>
    <div class="member-search__tag-list" data-member-label-sheet-list></div>
    <div class="member-search__tag-actions">
      <button class="button-neutral button-neutral--small" type="button" data-member-label-reset>초기화</button>
      <button class="primary-button" type="button" data-member-label-apply>적용</button>
    </div>
  </div>
  <script type="module" src="./member-page.js"></script>
</body>
</html>
